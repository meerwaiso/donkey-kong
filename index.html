<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donkey Kong Browser Game</title>
  <style>
    /* === CSS: Retro Pixel-Stil === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      border: 4px solid #e94560;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
    }

    #game {
      display: block;
      background-color: #0f0f23;
    }

    /* HUD Overlay */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #eee;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
      z-index: 10;
    }

    #score {
      color: #ffd700;
    }

    #lives {
      color: #e94560;
    }

    #world-level {
      color: #87CEEB;
    }

    /* Restart Button */
    #restart-btn {
      pointer-events: all;
      background-color: #e94560;
      color: #fff;
      border: none;
      padding: 4px 12px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 2px;
      text-transform: uppercase;
    }

    #restart-btn:hover {
      background-color: #c73652;
    }

    /* Settings Overlay */
    #settings-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      display: none;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      z-index: 25;
      padding: 20px;
    }

    #settings-overlay.active {
      display: flex;
    }

    #settings-overlay h2 {
      color: #ffd700;
      font-size: 28px;
      text-shadow: 3px 3px 0 #000;
      margin-bottom: 16px;
      letter-spacing: 4px;
    }

    #settings-overlay h3 {
      color: #e94560;
      font-size: 18px;
      text-shadow: 2px 2px 0 #000;
      margin: 12px 0 8px 0;
    }

    .highscore-list {
      color: #eee;
      font-size: 14px;
      text-shadow: 1px 1px 0 #000;
      text-align: left;
      width: 300px;
    }

    .highscore-list div {
      padding: 4px 0;
      border-bottom: 1px solid #333;
    }

    .highscore-list .rank {
      color: #ffd700;
      font-weight: bold;
      width: 30px;
      display: inline-block;
    }

    .highscore-list .hs-score {
      color: #4CAF50;
      float: right;
    }

    .highscore-list .hs-world {
      color: #aaa;
      font-size: 12px;
    }

    #settings-back {
      margin-top: 20px;
      background-color: #e94560;
      color: #fff;
      border: none;
      padding: 10px 24px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #settings-back:hover {
      background-color: #c73652;
    }

    #reset-progress-btn {
      margin-top: 10px;
      background-color: #555;
      color: #fff;
      border: none;
      padding: 8px 16px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #reset-progress-btn:hover {
      background-color: #777;
    }

    /* Game Over Overlay */
    #game-over {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 20;
    }

    #game-over.active {
      display: flex;
    }

    #game-over h1 {
      color: #e94560;
      font-size: 48px;
      text-shadow: 4px 4px 0 #000;
      margin-bottom: 16px;
      letter-spacing: 8px;
    }

    #game-over p {
      color: #ffd700;
      font-size: 20px;
      text-shadow: 2px 2px 0 #000;
      margin-bottom: 24px;
    }

    #game-over button {
      background-color: #e94560;
      color: #fff;
      border: none;
      padding: 12px 32px;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #game-over button:hover {
      background-color: #c73652;
    }

    /* Boss HP Bar */
    #boss-hp-container {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      display: none;
      z-index: 15;
      pointer-events: none;
    }

    #boss-hp-container.active {
      display: block;
    }

    #boss-name {
      color: #e94560;
      font-size: 14px;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
      text-align: center;
      margin-bottom: 4px;
    }

    #boss-hp-bar {
      width: 100%;
      height: 12px;
      background-color: #333;
      border: 2px solid #e94560;
      border-radius: 2px;
      overflow: hidden;
    }

    #boss-hp-fill {
      height: 100%;
      background-color: #e94560;
      transition: width 0.3s ease;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game" width="800" height="400"></canvas>

    <!-- HUD -->
    <div id="hud">
      <span id="score">Score: 0</span>
      <span id="world-level"></span>
      <button id="restart-btn">Restart</button>
      <span id="lives">❤❤❤</span>
    </div>

    <!-- Boss HP Bar -->
    <div id="boss-hp-container">
      <div id="boss-name">BOSS</div>
      <div id="boss-hp-bar">
        <div id="boss-hp-fill"></div>
      </div>
    </div>

    <!-- Settings Overlay -->
    <div id="settings-overlay">
      <h2>EINSTELLUNGEN</h2>
      <h3>🏆 Highscore</h3>
      <div class="highscore-list" id="highscore-list">
        <div>Keine Einträge</div>
      </div>
      <h3>🎮 Steuerung</h3>
      <div class="highscore-list" style="color:#ccc;">
        <div>← → Bewegen</div>
        <div>Space / ↑ Springen</div>
        <div>P Pause</div>
        <div>ESC Zurück zum Menü</div>
        <div>R Neustart (Game Over)</div>
        <div>O Einstellungen</div>
      </div>
      <button id="reset-progress-btn">Fortschritt zurücksetzen</button>
      <button id="settings-back">Zurück</button>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over">
      <h1>GAME OVER</h1>
      <p id="final-score">Score: 0</p>
      <p style="color:#aaa; font-size:14px; margin-bottom:16px; text-shadow:1px 1px 0 #000;">Drücke R zum Neustart</p>
      <button id="gameover-restart-btn">Restart</button>
    </div>
  </div>

  <script>
    // =====================================================
    // 1. CONSTANTS & CONFIG
    // =====================================================
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 400;
    const WORLD_WIDTH = 1600;
    const WORLD_HEIGHT = 400;

    // Physics
    const GRAVITY = 0.6;
    const JUMP_FORCE = -12;
    const MAX_FALL = 15;
    const MOVE_SPEED = 4;

    // Entity sizes
    const PLAYER_WIDTH = 32;
    const PLAYER_HEIGHT = 32;
    const PLATFORM_HEIGHT = 16;
    const BANANA_WIDTH = 16;
    const BANANA_HEIGHT = 16;
    const GOOMBA_WIDTH = 24;
    const GOOMBA_HEIGHT = 24;

    // Boss sizes
    const BOSS_WIDTH = 64;
    const BOSS_HEIGHT = 64;
    const BOSS_PROJECTILE_WIDTH = 12;
    const BOSS_PROJECTILE_HEIGHT = 12;

    // Camera smoothing
    const CAMERA_LERP = 0.1;
    const CAMERA_DEAD_ZONE = 280;
    const INVULNERABILITY_FRAMES = 120;

    // Level: Platforms
    const PLATFORMS = [
      { x: 0,     y: 360, width: 400 },
      { x: 350,   y: 280, width: 200 },
      { x: 100,   y: 200, width: 250 },
      { x: 450,   y: 160, width: 300 },
      { x: 850,   y: 240, width: 350 },
    ];

    const BANANA_POSITIONS = [
      { x: 50,  y: 340 }, { x: 150, y: 340 }, { x: 300, y: 340 },
      { x: 400, y: 260 }, { x: 500, y: 260 },
      { x: 150, y: 180 }, { x: 250, y: 180 },
      { x: 500, y: 140 }, { x: 650, y: 140 },
      { x: 950, y: 220 },
    ];

    const GOOMBA_CONFIGS = [
      { platformIndex: 2, x: 150, y: 176, speed: 1.5, patrolLeft: 100, patrolRight: 330 },
      { platformIndex: 4, x: 900, y: 216, speed: 2.0, patrolLeft: 850, patrolRight: 1180 },
    ];

    // =====================================================
    // 1.1 WORLD CONFIGURATION
    // =====================================================
    const WorldConfig = {
      jungle: {
        id: 1,
        name: "Dschungel",
        colors: {
          sky: "#1a472a", skyGradient: "#2d5a3f",
          ground: "#3d2b1f", platform: "#8B6914",
          platformHighlight: "#A0822A", platformShadow: "#6B5310",
          background: "#0d2818", particle: "#4CAF50", accent: "#FFD700"
        },
        background: {
          trees: true, vines: true, clouds: true,
          particles: "leaves", parallaxLayers: 2
        },
        enemyTheme: "barrel",
        platformTheme: "wood",
        bossType: "concrete_crusher",
        layout: {
          platforms: [
            { x: 0,     y: 360, width: 1600 },
            { x: 400,   y: 280, width: 200 },
            { x: 100,   y: 200, width: 250 },
            { x: 450,   y: 160, width: 300 },
            { x: 850,   y: 240, width: 400 },
          ],
          bananas: [
            { x: 50,  y: 340 }, { x: 150, y: 340 }, { x: 300, y: 340 },
            { x: 450, y: 260 }, { x: 550, y: 260 },
            { x: 150, y: 180 }, { x: 250, y: 180 },
            { x: 500, y: 140 }, { x: 650, y: 140 },
            { x: 950, y: 220 },
          ],
          goombas: [
            { platformIndex: 2, x: 150, y: 176, speed: 1.5, patrolLeft: 100, patrolRight: 330 },
            { platformIndex: 4, x: 900, y: 216, speed: 2.0, patrolLeft: 850, patrolRight: 1230 },
          ]
        }
      },
      snow: {
        id: 3,
        name: "Schnee",
        colors: {
          sky: "#4a6fa5", skyGradient: "#8ba4c7",
          ground: "#c8d6e5", platform: "#7f8fa6",
          platformHighlight: "#a4b0be", platformShadow: "#576574",
          background: "#2c3e50", particle: "#dfe6e9", accent: "#74b9ff"
        },
        background: {
          trees: false, vines: false, clouds: true,
          mountains: true, particles: "snow", parallaxLayers: 3
        },
        enemyTheme: "penguin",
        platformTheme: "ice",
        bossType: "frost_king",
        layout: {
          platforms: [
            { x: 0,     y: 360, width: 350 },
            { x: 300,   y: 300, width: 150 },
            { x: 500,   y: 240, width: 200 },
            { x: 200,   y: 180, width: 250 },
            { x: 550,   y: 140, width: 300 },
          ],
          bananas: [
            { x: 50,  y: 340 }, { x: 150, y: 340 },
            { x: 350, y: 280 },
            { x: 550, y: 220 }, { x: 650, y: 220 },
            { x: 250, y: 160 }, { x: 350, y: 160 },
            { x: 600, y: 120 }, { x: 750, y: 120 },
          ],
          goombas: [
            { platformIndex: 2, x: 550, y: 216, speed: 1.8, patrolLeft: 500, patrolRight: 680 },
            { platformIndex: 4, x: 600, y: 116, speed: 2.2, patrolLeft: 550, patrolRight: 830 },
          ]
        }
      },
      desert: {
        id: 2,
        name: "Wueste",
        colors: {
          sky: "#e17055", skyGradient: "#fdcb6e",
          ground: "#d4a574", platform: "#b8860b",
          platformHighlight: "#daa520", platformShadow: "#8b6914",
          background: "#6b3a2a", particle: "#fdcb6e", accent: "#e17055"
        },
        background: {
          trees: false, vines: false, clouds: false,
          dunes: true, pyramids: true, particles: "sand", parallaxLayers: 2
        },
        enemyTheme: "scorpion",
        platformTheme: "stone",
        bossType: "sand_worm",
        layout: {
          platforms: [
            { x: 0,     y: 360, width: 450 },
            { x: 400,   y: 300, width: 180 },
            { x: 650,   y: 240, width: 220 },
            { x: 150,   y: 180, width: 200 },
            { x: 500,   y: 140, width: 280 },
          ],
          bananas: [
            { x: 50,  y: 340 }, { x: 200, y: 340 }, { x: 350, y: 340 },
            { x: 450, y: 280 },
            { x: 700, y: 220 }, { x: 800, y: 220 },
            { x: 200, y: 160 }, { x: 300, y: 160 },
            { x: 550, y: 120 }, { x: 700, y: 120 },
          ],
          goombas: [
            { platformIndex: 2, x: 700, y: 216, speed: 2.0, patrolLeft: 650, patrolRight: 850 },
            { platformIndex: 4, x: 550, y: 116, speed: 1.5, patrolLeft: 500, patrolRight: 760 },
          ]
        }
      }
    };

    const WORLD_KEYS = ['jungle', 'desert', 'snow'];

    function getWorldConfig(worldIndex) {
      const key = WORLD_KEYS[worldIndex] || WORLD_KEYS[0];
      return WorldConfig[key];
    }

    // =====================================================
    // 1.2 LEVEL GATING (SCRUM-209)
    // =====================================================
    const LevelGating = {
      STORAGE_KEY: 'dk_level_progress',

      /**
       * Load unlocked levels from localStorage
       * Returns array of unlocked world indices [0, 1, 2]
       */
      load() {
        try {
          const data = localStorage.getItem(this.STORAGE_KEY);
          return data ? JSON.parse(data) : [0]; // Level 1 always unlocked
        } catch (e) {
          return [0];
        }
      },

      /**
       * Save unlocked levels
       */
      save(unlocked) {
        try {
          localStorage.setItem(this.STORAGE_KEY, JSON.stringify(unlocked));
        } catch (e) {
          // localStorage not available
        }
      },

      /**
       * Check if a world is unlocked
       */
      isUnlocked(worldIndex) {
        const unlocked = this.load();
        return unlocked.includes(worldIndex);
      },

      /**
       * Unlock a world
       */
      unlock(worldIndex) {
        const unlocked = this.load();
        if (!unlocked.includes(worldIndex)) {
          unlocked.push(worldIndex);
          unlocked.sort((a, b) => a - b);
          this.save(unlocked);
        }
      },

      /**
       * Reset all progress (lock all except level 1)
       */
      reset() {
        this.save([0]);
      },

      /**
       * Get lock message for a locked level
       */
      getLockMessage(worldIndex) {
        return `Schließe Level ${worldIndex} ab, um dieses Level freizuschalten`;
      }
    };

    // =====================================================
    // 2. GAME STATE
    // =====================================================
    const GameState = {
      state: 'play',       // 'menu' | 'play' | 'boss_fight' | 'boss_defeated' | 'gameover' | 'victory' | 'paused' | 'settings'
      score: 0,
      lives: 3,
      bananasTotal: 10,
      bananasCollected: 0,
      currentWorld: 0,
      bossDefeated: false
    };

    const Player = {
      x: 50,
      y: 328,
      vx: 0,
      vy: 0,
      width: PLAYER_WIDTH,
      height: PLAYER_HEIGHT,
      onGround: false,
      facing: 'right',
      animFrame: 0,
      animTimer: 0,
      invulnerable: 0,
      visible: true,
      spawnX: 50,
      spawnY: 328,
      speed: MOVE_SPEED,
      jumpForce: JUMP_FORCE
    };

    let platforms = [];
    let bananas = [];
    let goombas = [];
    let bossProjectiles = [];

    const Camera = {
      x: 0,
      y: 0
    };

    // =====================================================
    // 2.1 BOSS STATE
    // =====================================================
    const Boss = {
      active: false,
      x: 0,
      y: 0,
      vx: 0,
      vy: 0,
      width: BOSS_WIDTH,
      height: BOSS_HEIGHT,
      hp: 0,
      maxHp: 0,
      type: '',
      state: 'idle',       // 'idle' | 'attack' | 'warn' | 'dying'
      stateTimer: 0,
      attackTimer: 0,
      attackPattern: 0,
      facing: 'left',
      animFrame: 0,
      hitFlash: 0,

      /**
       * Initialize boss for the current world
       */
      init(worldIndex) {
        const wc = getWorldConfig(worldIndex);
        this.type = wc.bossType;
        this.active = true;
        this.state = 'idle';
        this.stateTimer = 0;
        this.attackTimer = 0;
        this.attackPattern = 0;
        this.hitFlash = 0;
        this.animFrame = 0;
        this.vx = 0;
        this.vy = 0;
        this.facing = 'left';

        // Position boss at right side of screen
        this.x = WORLD_WIDTH - 200;
        this.y = 360 - BOSS_HEIGHT;

        // World-specific boss stats
        switch (this.type) {
          case 'concrete_crusher':
            this.maxHp = 5;
            this.hp = 5;
            break;
          case 'frost_king':
            this.maxHp = 7;
            this.hp = 7;
            break;
          case 'sand_worm':
            this.maxHp = 10;
            this.hp = 10;
            break;
          default:
            this.maxHp = 5;
            this.hp = 5;
        }

        // Show boss HP bar
        const hpContainer = document.getElementById('boss-hp-container');
        const bossName = document.getElementById('boss-name');
        hpContainer.classList.add('active');
        bossName.textContent = this.getBossName();
        this.updateHpBar();
      },

      getBossName() {
        switch (this.type) {
          case 'concrete_crusher': return 'CONCRETE CRUSHER';
          case 'frost_king': return 'FROST KING';
          case 'sand_worm': return 'SAND WURM';
          default: return 'BOSS';
        }
      },

      updateHpBar() {
        const fill = document.getElementById('boss-hp-fill');
        fill.style.width = `${(this.hp / this.maxHp) * 100}%`;
      },

      deactivate() {
        this.active = false;
        document.getElementById('boss-hp-container').classList.remove('active');
        bossProjectiles = [];
      },

      /**
       * Take damage from player (jump on top)
       */
      takeDamage() {
        if (this.state === 'dying') return;
        this.hp--;
        this.hitFlash = 10;
        this.updateHpBar();

        if (this.hp <= 0) {
          this.state = 'dying';
          this.stateTimer = 60;
        } else {
          // Brief stun after hit
          this.state = 'idle';
          this.stateTimer = 30;
        }
      },

      /**
       * Update boss AI
       */
      update() {
        if (!this.active) return;

        this.animFrame += 0.05;

        if (this.hitFlash > 0) this.hitFlash--;

        // Dying animation
        if (this.state === 'dying') {
          this.stateTimer--;
          if (this.stateTimer <= 0) {
            this.active = false;
            GameState.bossDefeated = true;
            // Unlock next world
            const nextWorld = GameState.currentWorld + 1;
            if (nextWorld < WORLD_KEYS.length) {
              LevelGating.unlock(nextWorld);
            }
            this.deactivate();
            // Show level complete
            showBossDefeated();
          }
          return;
        }

        // Face player
        if (Player.x < this.x) {
          this.facing = 'left';
        } else {
          this.facing = 'right';
        }

        // Idle between attacks
        if (this.state === 'idle') {
          this.stateTimer--;
          if (this.stateTimer <= 0) {
            this.state = 'attack';
            this.attackTimer = 0;
            this.attackPattern = Math.floor(Math.random() * this.getAttackCount());
          }
          return;
        }

        // Execute attack
        if (this.state === 'attack') {
          this.executeAttack();
        }
      },

      getAttackCount() {
        switch (this.type) {
          case 'concrete_crusher': return 2;
          case 'frost_king': return 3;
          case 'sand_worm': return 4;
          default: return 2;
        }
      },

      executeAttack() {
        switch (this.type) {
          case 'concrete_crusher':
            this.crusherAttack();
            break;
          case 'frost_king':
            this.frostKingAttack();
            break;
          case 'sand_worm':
            this.sandWormAttack();
            break;
        }
      },

      // --- Concrete Crusher Attacks ---
      crusherAttack() {
        // Attack 0: Hammer slam (ground shake)
        // Attack 1: Fireball throw
        if (this.attackPattern === 0) {
          // Hammer slam - boss jumps and slams down
          if (this.attackTimer === 0) {
            this.state = 'warn';
            this.stateTimer = 30; // 0.5s warning
            this.attackTimer = 1;
          } else if (this.attackTimer === 1) {
            // Slam down - create damage zone
            this.vy = 10;
            this.attackTimer = 2;
          } else if (this.attackTimer === 2) {
            if (this.y >= 360 - BOSS_HEIGHT) {
              this.y = 360 - BOSS_HEIGHT;
              this.vy = 0;
              // Damage player if in range
              if (Math.abs(Player.x - this.x) < 120 && Player.invulnerable <= 0) {
                damagePlayer();
              }
              this.state = 'idle';
              this.stateTimer = 60;
              this.attackTimer = 0;
            }
          }
        } else {
          // Fireball
          if (this.attackTimer === 0) {
            this.state = 'warn';
            this.stateTimer = 20;
            this.attackTimer = 1;
          } else if (this.attackTimer === 1) {
            // Spawn fireball
            bossProjectiles.push({
              x: this.x + (this.facing === 'right' ? BOSS_WIDTH : -BOSS_PROJECTILE_WIDTH),
              y: this.y + BOSS_HEIGHT / 2 - BOSS_PROJECTILE_HEIGHT / 2,
              vx: this.facing === 'right' ? 5 : -5,
              vy: 0,
              width: BOSS_PROJECTILE_WIDTH,
              height: BOSS_PROJECTILE_HEIGHT,
              type: 'fireball',
              lifetime: 180
            });
            this.state = 'idle';
            this.stateTimer = 60;
            this.attackTimer = 0;
          }
        }
      },

      // --- Frost King Attacks ---
      frostKingAttack() {
        // Attack 0: Ice wedge (projectile)
        // Attack 1: Frost wave (ground)
        // Attack 2: Penguin summon
        if (this.attackPattern === 0) {
          // Ice wedge projectile
          if (this.attackTimer === 0) {
            this.state = 'warn';
            this.stateTimer = 20;
            this.attackTimer = 1;
          } else if (this.attackTimer === 1) {
            bossProjectiles.push({
              x: this.x + BOSS_WIDTH / 2,
              y: this.y + BOSS_HEIGHT / 2,
              vx: (Player.x < this.x ? -1 : 1) * 4,
              vy: -3,
              width: BOSS_PROJECTILE_WIDTH,
              height: BOSS_PROJECTILE_HEIGHT,
              type: 'ice_wedge',
              lifetime: 200
            });
            this.state = 'idle';
            this.stateTimer = 50;
            this.attackTimer = 0;
          }
        } else if (this.attackPattern === 1) {
          // Frost wave
          if (this.attackTimer === 0) {
            this.state = 'warn';
            this.stateTimer = 40;
            this.attackTimer = 1;
          } else if (this.attackTimer === 1) {
            // Spawn ground wave
            bossProjectiles.push({
              x: this.x,
              y: 360 - 20,
              vx: this.facing === 'right' ? 3 : -3,
              vy: 0,
              width: 40,
              height: 20,
              type: 'frost_wave',
              lifetime: 120
            });
            this.state = 'idle';
            this.stateTimer = 60;
            this.attackTimer = 0;
          }
        } else {
          // Penguin summon
          if (this.attackTimer === 0) {
            this.state = 'warn';
            this.stateTimer = 30;
            this.attackTimer = 1;
          } else if (this.attackTimer === 1) {
            // Spawn a penguin minion
            goombas.push({
              x: this.x + BOSS_WIDTH,
              y: 360 - GOOMBA_HEIGHT,
              vx: -1.5,
              width: GOOMBA_WIDTH,
              height: GOOMBA_HEIGHT,
              patrolLeft: 0,
              patrolRight: this.x + BOSS_WIDTH + 50,
              animFrame: 0,
              platformIndex: -1,
              isMinion: true
            });
            this.state = 'idle';
            this.stateTimer = 80;
            this.attackTimer = 0;
          }
        }
      },

      // --- Sand Worm Attacks ---
      sandWormAttack() {
        // Attack 0: Emerge from ground
        // Attack 1: Sand ball rain
        // Attack 2: Rotation attack
        // Attack 3: Scorpion summon
        if (this.attackPattern === 0) {
          // Emerge - boss jumps up and down
          if (this.attackTimer === 0) {
            this.state = 'warn';
            this.stateTimer = 25;
            this.attackTimer = 1;
          } else if (this.attackTimer === 1) {
            this.vy = -15;
            this.attackTimer = 2;
          } else if (this.attackTimer === 2) {
            applyGravity(this);
            this.y += this.vy;
            if (this.y >= 360 - BOSS_HEIGHT) {
              this.y = 360 - BOSS_HEIGHT;
              this.vy = 0;
              if (Math.abs(Player.x - this.x) < 100 && Player.invulnerable <= 0) {
                damagePlayer();
              }
              this.state = 'idle';
              this.stateTimer = 50;
              this.attackTimer = 0;
            }
          }
        } else if (this.attackPattern === 1) {
          // Sand ball rain
          if (this.attackTimer === 0) {
            this.state = 'warn';
            this.stateTimer = 30;
            this.attackTimer = 1;
          } else if (this.attackTimer >= 1 && this.attackTimer <= 5) {
            bossProjectiles.push({
              x: Player.x + Math.random() * 60 - 30,
              y: 0,
              vx: 0,
              vy: 4,
              width: BOSS_PROJECTILE_WIDTH,
              height: BOSS_PROJECTILE_HEIGHT,
              type: 'sand_ball',
              lifetime: 150
            });
            this.attackTimer++;
            if (this.attackTimer > 5) {
              this.state = 'idle';
              this.stateTimer = 60;
              this.attackTimer = 0;
            }
          }
        } else if (this.attackPattern === 2) {
          // Rotation - spawn spinning projectiles
          if (this.attackTimer === 0) {
            this.state = 'warn';
            this.stateTimer = 25;
            this.attackTimer = 1;
          } else if (this.attackTimer >= 1 && this.attackTimer <= 8) {
            const angle = (this.attackTimer - 1) * (Math.PI * 2 / 8);
            bossProjectiles.push({
              x: this.x + BOSS_WIDTH / 2,
              y: this.y + BOSS_HEIGHT / 2,
              vx: Math.cos(angle) * 3,
              vy: Math.sin(angle) * 3,
              width: BOSS_PROJECTILE_WIDTH,
              height: BOSS_PROJECTILE_HEIGHT,
              type: 'sand_spin',
              lifetime: 120
            });
            this.attackTimer++;
            if (this.attackTimer > 8) {
              this.state = 'idle';
              this.stateTimer = 70;
              this.attackTimer = 0;
            }
          }
        } else {
          // Scorpion summon
          if (this.attackTimer === 0) {
            this.state = 'warn';
            this.stateTimer = 30;
            this.attackTimer = 1;
          } else if (this.attackTimer === 1) {
            goombas.push({
              x: this.x + (Math.random() > 0.5 ? BOSS_WIDTH : -50),
              y: 360 - GOOMBA_HEIGHT,
              vx: (Math.random() > 0.5 ? 1 : -1) * 2,
              width: GOOMBA_WIDTH,
              height: GOOMBA_HEIGHT,
              patrolLeft: Math.max(0, this.x - 200),
              patrolRight: Math.min(WORLD_WIDTH, this.x + 200),
              animFrame: 0,
              platformIndex: -1,
              isMinion: true
            });
            this.state = 'idle';
            this.stateTimer = 90;
            this.attackTimer = 0;
          }
        }
      }
    };

    // =====================================================
    // 3. INPUT MANAGER
    // =====================================================
    const Input = {
      keys: {
        left: false, right: false, jump: false,
        confirm: false, pause: false, escape: false,
        restart: false, settings: false
      },
      justPressed: {},

      init() {
        window.addEventListener('keydown', (e) => this.onKeyDown(e));
        window.addEventListener('keyup', (e) => this.onKeyUp(e));
      },

      onKeyDown(e) {
        const keyMap = {
          'ArrowLeft': 'left', 'ArrowRight': 'right',
          'Space': 'jump', 'ArrowUp': 'jump',
          'Enter': 'confirm', 'KeyP': 'pause',
          'Escape': 'escape', 'KeyR': 'restart',
          'KeyO': 'settings'
        };
        const key = keyMap[e.code];
        if (key) {
          this.keys[key] = true;
          this.justPressed[key] = true;
          e.preventDefault();
        }
      },

      onKeyUp(e) {
        const keyMap = {
          'ArrowLeft': 'left', 'ArrowRight': 'right',
          'Space': 'jump', 'ArrowUp': 'jump',
          'Enter': 'confirm', 'KeyP': 'pause',
          'Escape': 'escape', 'KeyR': 'restart',
          'KeyO': 'settings'
        };
        const key = keyMap[e.code];
        if (key) this.keys[key] = false;
      },

      isPressed(key) { return this.keys[key] === true; },
      wasJustPressed(key) { return this.justPressed[key] === true; },
      clearJustPressed() { this.justPressed = {}; }
    };

    // =====================================================
    // 3.1 MENU MANAGER with Level Gating
    // =====================================================
    const MenuManager = {
      selectedIndex: 0,

      draw(ctx) {
        const cardW = 160;
        const cardH = 140;
        const gap = 30;
        const totalW = 3 * cardW + 2 * gap;
        const startX = (CANVAS_WIDTH - totalW) / 2;
        const startY = 120;

        // Dark overlay
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // Title
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 32px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('WELT AUSWAHLEN', CANVAS_WIDTH / 2, 60);

        // Hint
        ctx.fillStyle = '#aaa';
        ctx.font = '14px Courier New';
        ctx.fillText('Pfeiltasten navigieren | Enter bestatigen', CANVAS_WIDTH / 2, 90);

        // Draw world cards
        for (let i = 0; i < 3; i++) {
          const wc = getWorldConfig(i);
          const cx = startX + i * (cardW + gap);
          const selected = (i === this.selectedIndex);
          const unlocked = LevelGating.isUnlocked(i);

          // Card background
          if (!unlocked) {
            ctx.fillStyle = '#333';
          } else {
            ctx.fillStyle = selected ? '#ffd700' : wc.colors.sky;
          }
          ctx.fillRect(cx, startY, cardW, cardH);

          // Card border
          ctx.strokeStyle = selected ? '#fff' : (unlocked ? '#555' : '#666');
          ctx.lineWidth = selected ? 4 : 2;
          ctx.strokeRect(cx, startY, cardW, cardH);

          if (!unlocked) {
            // Locked overlay
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(cx, startY, cardW, cardH);

            // Lock icon
            ctx.fillStyle = '#e94560';
            ctx.font = 'bold 36px Courier New';
            ctx.fillText('🔒', cx + cardW / 2, startY + cardH / 2 + 5);

            // Lock message
            ctx.fillStyle = '#aaa';
            ctx.font = '10px Courier New';
            ctx.fillText(LevelGating.getLockMessage(i), cx + cardW / 2, startY + cardH - 10);
          } else {
            // World name
            ctx.fillStyle = selected ? '#000' : '#fff';
            ctx.font = 'bold 18px Courier New';
            ctx.fillText(wc.name, cx + cardW / 2, startY + 30);

            // Mini preview
            const previewY = startY + 55;
            ctx.fillStyle = wc.colors.platform;
            ctx.fillRect(cx + 20, previewY, cardW - 40, 10);
            ctx.fillStyle = wc.colors.platformHighlight;
            ctx.fillRect(cx + 20, previewY, cardW - 40, 3);

            // Mini banana
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(cx + cardW / 2 - 4, previewY - 16, 8, 12);

            // Enemy dot
            ctx.fillStyle = wc.colors.accent;
            ctx.fillRect(cx + cardW / 2 - 3, previewY + 20, 6, 6);

            // World ID
            ctx.fillStyle = selected ? '#000' : wc.colors.accent;
            ctx.font = '12px Courier New';
            ctx.fillText(`Welt ${wc.id}`, cx + cardW / 2, startY + cardH - 15);

            // Selection arrow
            if (selected) {
              ctx.fillStyle = '#fff';
              ctx.font = 'bold 24px Courier New';
              ctx.fillText('▼', cx + cardW / 2, startY - 10);
            }
          }
        }

        // Settings hint
        ctx.fillStyle = '#aaa';
        ctx.font = '12px Courier New';
        ctx.fillText('O = Einstellungen', CANVAS_WIDTH / 2, 370);

        ctx.textAlign = 'left';
      },

      handleInput() {
        if (Input.wasJustPressed('left')) {
          if (this.selectedIndex > 0) this.selectedIndex--;
        }
        if (Input.wasJustPressed('right')) {
          if (this.selectedIndex < 2) this.selectedIndex++;
        }
        if (Input.wasJustPressed('confirm')) {
          this.confirm();
        }
        if (Input.wasJustPressed('settings')) {
          showSettings();
          GameState.state = 'settings';
        }
      },

      confirm() {
        const selected = this.selectedIndex;
        if (!LevelGating.isUnlocked(selected)) {
          // Show lock message briefly
          return;
        }
        GameState.currentWorld = selected;
        GameState.state = 'play';
        reset();
      }
    };

    // =====================================================
    // 4. DRAWING FUNCTIONS
    // =====================================================

    function drawPlayer(ctx, p, camX) {
      if (p.invulnerable > 0 && Math.floor(p.invulnerable / 4) % 2 === 0) return;
      const sx = p.x - camX;
      const sy = p.y;
      // Body
      ctx.fillStyle = '#e94560';
      ctx.fillRect(sx + 4, sy + 8, 24, 16);
      // Head
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(sx + 8, sy, 16, 12);
      // Eyes
      ctx.fillStyle = '#000';
      if (p.facing === 'right') {
        ctx.fillRect(sx + 18, sy + 4, 3, 3);
      } else {
        ctx.fillRect(sx + 11, sy + 4, 3, 3);
      }
      // Legs
      ctx.fillStyle = '#8B6914';
      const legOffset = Math.sin(p.animFrame * 0.3) * 4;
      ctx.fillRect(sx + 6, sy + 24, 8, 8 + legOffset);
      ctx.fillRect(sx + 18, sy + 24, 8, 8 - legOffset);
    }

    function drawBoss(ctx, b, camX) {
      if (!b.active) return;
      const sx = b.x - camX;
      const sy = b.y;
      // Hit flash
      if (b.hitFlash > 0 && b.hitFlash % 2 === 0) {
        ctx.fillStyle = '#fff';
      } else {
        // Boss body color based on type
        switch (b.type) {
          case 'concrete_crusher':
            ctx.fillStyle = '#666';
            break;
          case 'frost_king':
            ctx.fillStyle = '#74b9ff';
            break;
          case 'sand_worm':
            ctx.fillStyle = '#fdcb6e';
            break;
          default:
            ctx.fillStyle = '#e94560';
        }
      }
      // Main body
      ctx.fillRect(sx, sy, BOSS_WIDTH, BOSS_HEIGHT);
      // Eyes
      ctx.fillStyle = b.hitFlash > 0 ? '#ff0000' : '#fff';
      if (b.facing === 'right') {
        ctx.fillRect(sx + 40, sy + 16, 12, 8);
        ctx.fillRect(sx + 56, sy + 16, 8, 8);
      } else {
        ctx.fillRect(sx + 6, sy + 16, 8, 8);
        ctx.fillRect(sx + 22, sy + 16, 12, 8);
      }
      // Pupils
      ctx.fillStyle = '#000';
      if (b.facing === 'right') {
        ctx.fillRect(sx + 46, sy + 18, 4, 4);
        ctx.fillRect(sx + 58, sy + 18, 4, 4);
      } else {
        ctx.fillRect(sx + 8, sy + 18, 4, 4);
        ctx.fillRect(sx + 28, sy + 18, 4, 4);
      }
      // Mouth
      ctx.fillStyle = '#000';
      ctx.fillRect(sx + 16, sy + 44, 32, 6);
      // Warning indicator
      if (b.state === 'warn') {
        ctx.fillStyle = '#ff0000';
        ctx.font = 'bold 28px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('!', sx + BOSS_WIDTH / 2, sy - 10);
        ctx.textAlign = 'left';
      }
      // Dying effect
      if (b.state === 'dying') {
        ctx.fillStyle = `rgba(255, 255, 255, ${b.stateTimer / 60})`;
        ctx.fillRect(sx, sy, BOSS_WIDTH, BOSS_HEIGHT);
      }
    }

    function drawBossProjectile(ctx, proj, camX) {
      const sx = proj.x - camX;
      switch (proj.type) {
        case 'fireball':
          ctx.fillStyle = '#ff6600';
          ctx.fillRect(sx, proj.y, proj.width, proj.height);
          ctx.fillStyle = '#ffcc00';
          ctx.fillRect(sx + 2, proj.y + 2, proj.width - 4, proj.height - 4);
          break;
        case 'ice_wedge':
          ctx.fillStyle = '#74b9ff';
          ctx.fillRect(sx, proj.y, proj.width, proj.height);
          ctx.fillStyle = '#dfe6e9';
          ctx.fillRect(sx + 2, proj.y + 2, proj.width - 4, proj.height - 4);
          break;
        case 'frost_wave':
          ctx.fillStyle = 'rgba(116, 185, 255, 0.6)';
          ctx.fillRect(sx, proj.y, proj.width, proj.height);
          break;
        case 'sand_ball':
          ctx.fillStyle = '#fdcb6e';
          ctx.fillRect(sx, proj.y, proj.width, proj.height);
          break;
        case 'sand_spin':
          ctx.fillStyle = '#e17055';
          ctx.fillRect(sx, proj.y, proj.width, proj.height);
          break;
      }
    }

    function drawBanana(ctx, b, camX) {
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(b.x - camX, b.y, BANANA_WIDTH, BANANA_HEIGHT);
      ctx.fillStyle = '#DAA520';
      ctx.fillRect(b.x - camX + 2, b.y + 2, BANANA_WIDTH - 4, BANANA_HEIGHT - 4);
    }

    function drawGoomba(ctx, g, camX) {
      const sx = g.x - camX;
      // Body
      ctx.fillStyle = g.isMinion ? '#e17055' : '#8B6914';
      ctx.fillRect(sx, g.y, GOOMBA_WIDTH, GOOMBA_HEIGHT);
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.fillRect(sx + 4, g.y + 6, 6, 6);
      ctx.fillRect(sx + 14, g.y + 6, 6, 6);
      ctx.fillStyle = '#000';
      ctx.fillRect(sx + 6, g.y + 8, 3, 3);
      ctx.fillRect(sx + 16, g.y + 8, 3, 3);
    }

    function drawPlatform(ctx, p, camX) {
      const wc = getWorldConfig(GameState.currentWorld);
      ctx.fillStyle = wc.colors.platform;
      ctx.fillRect(p.x - camX, p.y, p.width, PLATFORM_HEIGHT);
      ctx.fillStyle = wc.colors.platformHighlight;
      ctx.fillRect(p.x - camX, p.y, p.width, 3);
      ctx.fillStyle = wc.colors.platformShadow;
      ctx.fillRect(p.x - camX, p.y + PLATFORM_HEIGHT - 3, p.width, 3);
    }

    function drawBackground(ctx, camX) {
      const wc = getWorldConfig(GameState.currentWorld);
      // Sky gradient
      const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
      grad.addColorStop(0, wc.colors.sky);
      grad.addColorStop(1, wc.colors.skyGradient);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      // Parallax background elements
      const parallax = camX * 0.3;
      ctx.fillStyle = wc.colors.background;
      for (let i = 0; i < 8; i++) {
        const bx = (i * 250 - parallax) % (CANVAS_WIDTH + 250);
        ctx.fillRect(bx, 50 + i * 30, 80, 150);
      }
      // Clouds
      if (wc.background.clouds) {
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        for (let i = 0; i < 5; i++) {
          const cx = (i * 300 - camX * 0.1) % (CANVAS_WIDTH + 300);
          ctx.fillRect(cx, 30 + i * 20, 60, 20);
        }
      }
    }

    // =====================================================
    // 5. PHYSICS & COLLISION
    // =====================================================

    function applyGravity(entity) {
      entity.vy += GRAVITY;
      if (entity.vy > MAX_FALL) entity.vy = MAX_FALL;
    }

    function rectCollision(a, b) {
      return a.x < b.x + b.width &&
             a.x + a.width > b.x &&
             a.y < b.y + b.height &&
             a.y + a.height > b.y;
    }

    function updatePlayer() {
      // Horizontal movement
      if (Input.isPressed('left')) {
        Player.vx = -Player.speed;
        Player.facing = 'left';
      } else if (Input.isPressed('right')) {
        Player.vx = Player.speed;
        Player.facing = 'right';
      } else {
        Player.vx = 0;
      }
      // Jump
      if (Input.wasJustPressed('jump') && Player.onGround) {
        Player.vy = Player.jumpForce;
        Player.onGround = false;
      }
      // Apply gravity
      applyGravity(Player);
      // Move X
      Player.x += Player.vx;
      // Clamp X
      if (Player.x < 0) Player.x = 0;
      if (Player.x > WORLD_WIDTH - Player.width) Player.x = WORLD_WIDTH - Player.width;
      // Move Y
      Player.y += Player.vy;
      // Platform collision
      Player.onGround = false;
      for (const plat of platforms) {
        if (Player.vy >= 0 &&
            Player.x + Player.width > plat.x &&
            Player.x < plat.x + plat.width &&
            Player.y + Player.height >= plat.y &&
            Player.y + Player.height <= plat.y + PLATFORM_HEIGHT + Player.vy + 2) {
          Player.y = plat.y - Player.height;
          Player.vy = 0;
          Player.onGround = true;
        }
      }
      // Fall off screen
      if (Player.y > CANVAS_HEIGHT + 50) {
        loseLife();
      }
      // Invulnerability timer
      if (Player.invulnerable > 0) Player.invulnerable--;
      // Animation
      if (Math.abs(Player.vx) > 0) Player.animFrame += 0.3;
    }

    function updateGoombas() {
      for (const g of goombas) {
        g.x += g.vx;
        g.animFrame += 0.1;
        // Patrol
        if (g.x <= g.patrolLeft || g.x + g.width >= g.patrolRight) {
          g.vx *= -1;
        }
      }
    }

    function updateBossProjectiles() {
      for (let i = bossProjectiles.length - 1; i >= 0; i--) {
        const p = bossProjectiles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.lifetime--;
        if (p.lifetime <= 0) {
          bossProjectiles.splice(i, 1);
        }
      }
    }

    // =====================================================
    // 5.1 DAMAGE & COLLISION
    // =====================================================

    function damagePlayer() {
      if (Player.invulnerable > 0) return;
      GameState.lives--;
      Player.invulnerable = INVULNERABILITY_FRAMES;
      Player.vy = JUMP_FORCE;
      updateHUD();
      if (GameState.lives <= 0) {
        showGameOver();
      }
    }

    function loseLife() {
      GameState.lives--;
      updateHUD();
      if (GameState.lives <= 0) {
        showGameOver();
      } else {
        respawnPlayer();
      }
    }

    function respawnPlayer() {
      Player.x = Player.spawnX;
      Player.y = Player.spawnY;
      Player.vx = 0;
      Player.vy = 0;
      Player.invulnerable = INVULNERABILITY_FRAMES;
    }

    function checkCollisions() {
      // Player vs Bananas
      for (let i = bananas.length - 1; i >= 0; i--) {
        const b = bananas[i];
        if (rectCollision(Player, b)) {
          bananas.splice(i, 1);
          GameState.bananasCollected++;
          GameState.score += 100;
          updateHUD();
          // Check if all bananas collected -> start boss fight
          if (GameState.bananasCollected >= GameState.bananasTotal && !Boss.active) {
            startBossFight();
          }
        }
      }
      // Player vs Goombas
      for (let i = goombas.length - 1; i >= 0; i--) {
        const g = goombas[i];
        if (rectCollision(Player, g)) {
          // Stomp from above
          if (Player.vy > 0 && Player.y + Player.height - 8 < g.y + g.height / 2) {
            goombas.splice(i, 1);
            Player.vy = JUMP_FORCE * 0.6;
            GameState.score += 200;
            updateHUD();
          } else if (Player.invulnerable <= 0) {
            damagePlayer();
          }
        }
      }
      // Player vs Boss
      if (Boss.active && Boss.state !== 'dying') {
        if (rectCollision(Player, Boss)) {
          // Stomp boss from above
          if (Player.vy > 0 && Player.y + Player.height - 8 < Boss.y + Boss.height / 2) {
            Boss.takeDamage();
            Player.vy = JUMP_FORCE * 0.6;
            GameState.score += 500;
            updateHUD();
          } else if (Player.invulnerable <= 0) {
            damagePlayer();
          }
        }
      }
      // Player vs Boss Projectiles
      if (Boss.active) {
        for (let i = bossProjectiles.length - 1; i >= 0; i--) {
          const p = bossProjectiles[i];
          if (rectCollision(Player, p)) {
            if (Player.invulnerable <= 0) {
              damagePlayer();
            }
            bossProjectiles.splice(i, 1);
          }
        }
      }
    }

    // =====================================================
    // 5.2 BOSS FIGHT
    // =====================================================

    function startBossFight() {
      GameState.state = 'boss_fight';
      Boss.init(GameState.currentWorld);
      // Spawn player near boss
      Player.spawnX = 200;
      Player.spawnY = 328;
      Player.x = 200;
      Player.y = 328;
      Player.vx = 0;
      Player.vy = 0;
    }

    function showBossDefeated() {
      const wc = getWorldConfig(GameState.currentWorld);
      GameState.score += 1000;
      updateHUD();
      if (GameState.currentWorld >= 2) {
        // Final boss defeated
        GameState.state = 'victory';
        saveHighscore();
      }
      // After a brief moment, go to menu
      setTimeout(() => {
        GameState.state = 'menu';
        MenuManager.selectedIndex = GameState.currentWorld;
      }, 2000);
    }

    // =====================================================
    // 6. CAMERA
    // =====================================================

    function updateCamera() {
      const targetX = Player.x - CANVAS_WIDTH / 2 + PLAYER_WIDTH / 2;
      Camera.x += (targetX - Camera.x) * CAMERA_LERP;
      if (Camera.x < 0) Camera.x = 0;
      if (Camera.x > WORLD_WIDTH - CANVAS_WIDTH) Camera.x = WORLD_WIDTH - CANVAS_WIDTH;
    }

    // =====================================================
    // 7. HUD & UI
    // =====================================================

    function updateHUD() {
      document.getElementById('score').textContent = `Score: ${GameState.score}`;
      const wc = getWorldConfig(GameState.currentWorld);
      document.getElementById('world-level').textContent = `Welt ${wc.id} — ${wc.name}`;
      let hearts = '';
      for (let i = 0; i < GameState.lives; i++) hearts += '❤';
      document.getElementById('lives').textContent = hearts || '💀';
    }

    function showGameOver() {
      GameState.state = 'gameover';
      document.getElementById('final-score').textContent = `Score: ${GameState.score}`;
      document.getElementById('game-over').classList.add('active');
    }

    function showSettings() {
      document.getElementById('settings-overlay').classList.add('active');
      loadHighscores();
    }

    function hideSettings() {
      document.getElementById('settings-overlay').classList.remove('active');
    }

    // =====================================================
    // 7.1 HIGHSCORE
    // =====================================================

    function loadHighscores() {
      try {
        const data = localStorage.getItem('dk_highscores');
        const list = document.getElementById('highscore-list');
        if (data) {
          const scores = JSON.parse(data);
          list.innerHTML = scores.length === 0
            ? '<div>Keine Eintr&auml;ge</div>'
            : scores.map((s, i) =>
                `<div><span class="rank">${i + 1}.</span> ${s.world} <span class="hs-score">${s.score}</span></div>`
              ).join('');
        }
      } catch (e) {
        // ignore
      }
    }

    function saveHighscore() {
      try {
        let scores = [];
        const data = localStorage.getItem('dk_highscores');
        if (data) scores = JSON.parse(data);
        const wc = getWorldConfig(GameState.currentWorld);
        scores.push({ score: GameState.score, world: `Welt ${wc.id} (${wc.name})` });
        scores.sort((a, b) => b.score - a.score);
        scores = scores.slice(0, 10);
        localStorage.setItem('dk_highscores', JSON.stringify(scores));
      } catch (e) {
        // ignore
      }
    }

    // =====================================================
    // 8. LEVEL INIT
    // =====================================================

    function reset() {
      const wc = getWorldConfig(GameState.currentWorld);
      // Player
      Player.x = 50;
      Player.y = 328;
      Player.vx = 0;
      Player.vy = 0;
      Player.onGround = false;
      Player.facing = 'right';
      Player.animFrame = 0;
      Player.invulnerable = 60;
      Player.spawnX = 50;
      Player.spawnY = 328;
      // Game state
      GameState.bananasCollected = 0;
      GameState.bossDefeated = false;
      // Entities
      platforms = wc.layout.platforms.map(p => ({ ...p, height: PLATFORM_HEIGHT }));
      bananas = wc.layout.bananas.map(b => ({
        ...b,
        width: BANANA_WIDTH,
        height: BANANA_HEIGHT
      }));
      GameState.bananasTotal = bananas.length;
      goombas = wc.layout.goombas.map(g => ({
        ...g,
        vx: g.speed,
        width: GOOMBA_WIDTH,
        height: GOOMBA_HEIGHT,
        animFrame: 0,
        isMinion: false
      }));
      bossProjectiles = [];
      Boss.deactivate();
      // Camera
      Camera.x = 0;
      updateHUD();
    }

    // =====================================================
    // 9. GAME LOOP
    // =====================================================

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    function gameLoop() {
      // Clear
      ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      // State machine
      switch (GameState.state) {
        case 'menu':
          drawBackground(ctx, 0);
          MenuManager.draw(ctx);
          MenuManager.handleInput();
          break;
        case 'play':
        case 'boss_fight':
          // Update
          updatePlayer();
          updateGoombas();
          if (Boss.active) Boss.update();
          updateBossProjectiles();
          checkCollisions();
          updateCamera();
          // Draw
          drawBackground(ctx, Camera.x);
          for (const p of platforms) drawPlatform(ctx, p, Camera.x);
          for (const b of bananas) drawBanana(ctx, b, Camera.x);
          for (const g of goombas) drawGoomba(ctx, g, Camera.x);
          drawPlayer(ctx, Player, Camera.x);
          if (Boss.active) drawBoss(ctx, Boss, Camera.x);
          for (const p of bossProjectiles) drawBossProjectile(ctx, p, Camera.x);
          // Boss defeated overlay
          if (GameState.bossDefeated) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 36px Courier New';
            ctx.textAlign = 'center';
            const wc = getWorldConfig(GameState.currentWorld);
            if (GameState.currentWorld >= 2) {
              ctx.fillText('SPIEL ABGESCHLOSSEN!', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 20);
            } else {
              ctx.fillText(`LEVEL ${wc.id} ABGESCHLOSSEN!`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 20);
            }
            ctx.font = '18px Courier New';
            ctx.fillText(`Score: ${GameState.score}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 20);
            ctx.textAlign = 'left';
          }
          // Pause
          if (Input.wasJustPressed('pause') || Input.wasJustPressed('escape')) {
            GameState.state = 'paused';
          }
          if (Input.wasJustPressed('settings')) {
            showSettings();
            GameState.state = 'settings';
          }
          break;
        case 'paused':
          drawBackground(ctx, Camera.x);
          for (const p of platforms) drawPlatform(ctx, p, Camera.x);
          for (const b of bananas) drawBanana(ctx, b, Camera.x);
          for (const g of goombas) drawGoomba(ctx, g, Camera.x);
          drawPlayer(ctx, Player, Camera.x);
          if (Boss.active) drawBoss(ctx, Boss, Camera.x);
          // Pause overlay
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
          ctx.fillStyle = '#ffd700';
          ctx.font = 'bold 40px Courier New';
          ctx.textAlign = 'center';
          ctx.fillText('PAUSE', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
          ctx.font = '16px Courier New';
          ctx.fillStyle = '#aaa';
          ctx.fillText('P zum Fortsetzen', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 40);
          ctx.textAlign = 'left';
          if (Input.wasJustPressed('pause')) {
            GameState.state = 'play';
          }
          break;
        case 'gameover':
          drawBackground(ctx, Camera.x);
          for (const p of platforms) drawPlatform(ctx, p, Camera.x);
          if (Input.wasJustPressed('restart')) {
            hideGameOver();
            fullReset();
          }
          break;
        case 'settings':
          drawBackground(ctx, Camera.x);
          if (Input.wasJustPressed('escape')) {
            hideSettings();
            GameState.state = 'paused';
          }
          break;
        case 'victory':
          drawBackground(ctx, Camera.x);
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
          ctx.fillStyle = '#ffd700';
          ctx.font = 'bold 40px Courier New';
          ctx.textAlign = 'center';
          ctx.fillText('SPIEL ABGESCHLOSSEN!', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 30);
          ctx.font = '20px Courier New';
          ctx.fillText(`Final Score: ${GameState.score}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 20);
          ctx.font = '14px Courier New';
          ctx.fillStyle = '#aaa';
          ctx.fillText('ESC zum Menu', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 60);
          ctx.textAlign = 'left';
          if (Input.wasJustPressed('escape')) {
            GameState.state = 'menu';
          }
          break;
      }
      Input.clearJustPressed();
      requestAnimationFrame(gameLoop);
    }

    function hideGameOver() {
      document.getElementById('game-over').classList.remove('active');
    }

    function fullReset() {
      GameState.score = 0;
      GameState.lives = 3;
      GameState.currentWorld = 0;
      GameState.bananasCollected = 0;
      GameState.bossDefeated = false;
      Boss.deactivate();
      GameState.state = 'menu';
      MenuManager.selectedIndex = 0;
    }

    // =====================================================
    // 10. EVENT LISTENERS & INIT
    // =====================================================

    document.getElementById('restart-btn').addEventListener('click', () => {
      if (GameState.state === 'gameover') {
        hideGameOver();
        fullReset();
      } else {
        reset();
      }
    });

    document.getElementById('gameover-restart-btn').addEventListener('click', () => {
      hideGameOver();
      fullReset();
    });

    document.getElementById('settings-back').addEventListener('click', () => {
      hideSettings();
      GameState.state = 'paused';
    });

    document.getElementById('reset-progress-btn').addEventListener('click', () => {
      LevelGating.reset();
      alert('Fortschritt wurde zurueckgesetzt!');
    });

    // Start
    Input.init();
    GameState.state = 'menu';
    gameLoop();
  </script>
</body>
</html>
